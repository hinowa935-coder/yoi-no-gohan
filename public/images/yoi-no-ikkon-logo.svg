<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">宵の一献</title>
  <desc id="desc">藍色の夜に三日月、徳利と盃、金色の題字を配したロゴ</desc>
  <defs>
    <radialGradient id="paper" cx="42%" cy="38%" r="80%">
      <stop offset="0" stop-color="#102744"/>
      <stop offset="0.54" stop-color="#081a31"/>
      <stop offset="1" stop-color="#041020"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff3c9"/>
      <stop offset="0.42" stop-color="#e5c46f"/>
      <stop offset="1" stop-color="#b38334"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grain" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M3 4h1M13 9h1M25 2h1M31 18h1M8 29h1M19 25h1M33 33h1" stroke="#f8e7b6" stroke-opacity=".055"/>
      <path d="M2 17h8M15 15h5M23 28h9M11 34h7" stroke="#001025" stroke-opacity=".35"/>
    </pattern>
  </defs>

  <rect width="980" height="520" fill="url(#paper)"/>
  <rect width="980" height="520" fill="url(#grain)" opacity=".9"/>
  <path d="M0 0h980v520H0z" fill="none" stroke="#e1bf72" stroke-opacity=".12" stroke-width="2"/>

  <g filter="url(#softGlow)" fill="none" stroke="url(#gold)" stroke-linecap="round">
    <path d="M207 135c-50 34-62 104-26 151 28 36 78 48 119 28-45 9-87-15-103-55-17-42-2-91 35-115 17-11 36-14 52-11-25-16-54-15-77 2z" stroke-width="8"/>
    <path d="M219 147c-31 25-40 74-17 107 19 27 55 38 86 27-32 1-62-17-73-47-12-32 1-69 28-85" stroke-width="3" opacity=".75"/>
  </g>

  <g fill="url(#gold)" opacity=".95">
    <circle cx="142" cy="282" r="2.2"/>
    <circle cx="204" cy="328" r="2"/>
    <circle cx="286" cy="202" r="1.8"/>
    <circle cx="339" cy="230" r="2.1"/>
    <path d="M374 248l8 20 20 8-20 8-8 20-8-20-20-8 20-8z"/>
    <path d="M314 165l5 13 13 5-13 5-5 13-5-13-13-5 13-5z"/>
  </g>

  <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M145 394c41 11 147 12 218 0" stroke-width="2" opacity=".58"/>
    <path d="M164 411c44 7 123 8 167 0" stroke-width="1.5" opacity=".42"/>
    <path d="M104 356c23-11 63-11 86 0-5 10-5 37 0 50-27 8-59 8-86 0 5-13 5-40 0-50z" stroke-width="4"/>
    <path d="M123 354c-3-37 8-70 23-90 15 20 26 53 23 90" stroke-width="4"/>
    <path d="M126 263c11-8 29-8 40 0" stroke-width="4"/>
    <path d="M226 395c7-23 57-23 64 0-7 23-57 23-64 0z" stroke-width="4"/>
    <path d="M239 388c12-4 27-4 39 0" stroke-width="2" opacity=".7"/>
  </g>

  <g fill="url(#gold)" text-anchor="middle">
    <text x="615" y="318"
      font-family="Yu Mincho, Hiragino Mincho ProN, Noto Serif JP, serif"
      font-size="112"
      font-weight="600"
      letter-spacing="8">宵の一献</text>
    <line x1="365" y1="365" x2="470" y2="365" stroke="#d7ad55" stroke-width="2" opacity=".85"/>
    <line x1="760" y1="365" x2="865" y2="365" stroke="#d7ad55" stroke-width="2" opacity=".85"/>
    <text x="615" y="371"
      font-family="Georgia, Times New Roman, serif"
      font-size="23"
      letter-spacing="9">YOI NO IKKON</text>
    <text x="615" y="417"
      font-family="Yu Mincho, Hiragino Mincho ProN, Noto Serif JP, serif"
      font-size="25"
      letter-spacing="9">今夜の一杯が、あなたに寄り添う。</text>
  </g>
